<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roles semanales</title>
  <style>
    :root { --green:#0b6e63; --green-soft:#d9ddda; --green-line:#2c7b70; --blue:#3c7f8f; --gold:#a87d10; --red:#a51f27; --bg:#edf1f2; --paper:#f5f5f3; --border:#d8d8d4; --text:#152128; --muted:#5e6a70; --tab:#e9edeb; --night:#183556; --daychip:#e0b11a; --chip:#f0f3f4; }
    * { box-sizing:border-box; }
    html, body { margin:0; padding:0; }
    body { font-family:Arial,Helvetica,sans-serif; background:var(--bg); color:var(--text); padding:14px; }
    .app { max-width:980px; margin:0 auto; }
    .meeting-menu { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:6px; margin:0 0 12px; width:100%; }
    .meeting-tab { border:1px solid #cfd6d8; background:var(--tab); color:#23443f; padding:11px 8px; border-radius:999px; font-size:clamp(11px,2.6vw,14px); font-weight:800; cursor:pointer; text-align:center; width:100%; line-height:1.08; min-height:42px; display:flex; align-items:center; justify-content:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .meeting-tab.active { background:var(--green); color:#fff; border-color:var(--green); box-shadow:0 2px 8px rgba(11,110,99,.18); }
    .meeting-tab .topline, .meeting-tab .bottomline { display:inline; }
    .meeting-tab .bottomline { margin-left:3px; }
    .view { display:none; } .view.active { display:block; } .hidden { display:none!important; }
    .loading-state,.empty-state,.error-state { background:#fff; border:1px dashed #cad2d6; border-radius:20px; padding:28px 20px; text-align:center; color:#506067; font-size:16px; }
    .error-state small { display:block; margin-top:8px; color:#8b4a4a; white-space:pre-wrap; }

    .card { background:var(--paper); border:1px solid var(--border); border-radius:18px; box-shadow:0 2px 10px rgba(0,0,0,.05); overflow:hidden; }
    .head { background:var(--green); color:#fff; padding:14px 18px 10px; }
    .head-nav { display:grid; grid-template-columns:44px 1fr 44px; align-items:center; gap:10px; }
    .nav-arrow { width:44px; height:44px; border:none; border-radius:999px; background:rgba(255,255,255,.16); color:#fff; font-size:20px; font-weight:800; cursor:pointer; }
    .nav-arrow:disabled { opacity:.35; cursor:not-allowed; }
    .head-title { text-align:center; font-size:clamp(1.08rem,2vw,1.55rem); font-weight:800; line-height:1.2; }
    .sub { background:var(--green-soft); color:var(--green); padding:6px 18px 8px; font-weight:700; }
    .block { padding:0 18px 12px; }
    .section-title { font-size:1.1rem; font-weight:800; text-transform:uppercase; margin:14px 0 8px; padding-bottom:6px; border-bottom:3px solid; }
    .s-blue { color:var(--blue); border-color:#4f8d98; } .s-gold { color:var(--gold); border-color:#b18a18; } .s-red { color:var(--red); border-color:#b13338; }
    .song { float:right; font-size:.98rem; font-weight:700; }
    .item { margin:10px 0; }
    .item-title { font-size:1.08rem; font-weight:700; line-height:1.25; }
    .blue-t { color:var(--blue); } .gold-t { color:var(--gold); } .red-t { color:var(--red); }
    .item-person { margin-top:5px; margin-left:14px; font-size:1.05rem; color:#111; }
    .lector-below { margin-top:2px; margin-left:14px; color:var(--red); font-size:1rem; font-weight:700; }
    .lector-below .lector-name { color:#111; font-weight:400; margin-left:4px; }
    .footer-note,.footer-prayer,.cleaning { padding:0 18px 12px; color:var(--green); font-weight:700; }
    .cleaning { font-size:1.35rem; padding-bottom:18px; }

    .wk-wrap { max-width:780px; margin:0 auto; }
    .wk-card { background:#f7f7f2; border:2px solid #2f8b7f; border-radius:0 0 42px 42px; overflow:hidden; }
    .wk-date { background:var(--green); color:#fff; padding:14px 18px 12px; border-bottom:1px solid var(--green-line); }
    .wk-date-nav { display:grid; grid-template-columns:44px 1fr 44px; gap:10px; align-items:center; }
    .wk-date-title { text-align:center; font-size:clamp(1.72rem,2.5vw,2.2rem); font-weight:800; line-height:1.1; color:#fff; }
    .wk-body { padding:16px 44px 22px; }
    .wk-president { color:var(--green); font-size:clamp(1rem,1.25vw,1.25rem); font-weight:800; margin-bottom:14px; }
    .wk-president .name { font-weight:400; color:#275e58; }
    .wk-band { display:flex; align-items:center; justify-content:space-between; gap:12px; border-bottom:3px solid; padding-bottom:6px; margin-top:10px; }
    .wk-band-left { display:flex; align-items:center; gap:8px; min-width:0; }
    .wk-green-band { color:var(--green); border-color:var(--green-line); }
    .wk-red-band { color:#b11f29; border-color:#c43a42; }
    .wk-band-title { font-size:clamp(1rem,1.28vw,1.32rem); font-weight:800; text-transform:uppercase; line-height:1.1; }
    .wk-band-song { font-size:clamp(.94rem,1.05vw,1.1rem); font-weight:700; white-space:nowrap; }
    .wk-main-title { text-align:center; color:var(--green); font-size:clamp(2rem,3.6vw,3rem); font-weight:800; line-height:1.12; margin:22px auto 10px; }
    .wk-main-speaker { text-align:center; color:#165a56; font-size:clamp(1.45rem,1.9vw,2rem); margin:10px 0 4px; }
    .wk-main-sub { text-align:center; color:#2d6963; font-size:clamp(1.03rem,1.35vw,1.28rem); margin:0 0 12px; }
    .wk-watch-title { text-align:center; color:#ab1a23; font-size:clamp(1.95rem,3vw,2.8rem); font-weight:800; line-height:1.13; margin:20px auto 10px; }
    .wk-watch-conductor { text-align:center; color:#8c1820; font-size:clamp(1.35rem,1.7vw,1.8rem); margin:8px 0 4px; }
    .wk-watch-lector { text-align:center; color:#8c1820; font-size:clamp(1rem,1.35vw,1.12rem); margin:2px 0 18px; }
    .wk-foot-song { text-align:right; color:var(--green); font-size:clamp(1.2rem,1.4vw,1.5rem); font-weight:800; margin-top:10px; }
    .wk-cleaning { text-align:right; color:var(--green); font-size:clamp(2rem,2.8vw,3rem); font-weight:900; margin-top:10px; }
    .wk-support { margin-top:10px; color:var(--green); font-size:clamp(1rem,1.25vw,1.12rem); font-weight:700; }
    .wk-support div { margin:3px 0; }
    .wk-support span { font-weight:400; color:#163d3a; margin-left:6px; }

    .pred-wrap { display:grid; gap:14px; }
    .pred-next { display:none; }
    .pred-next-label { font-size:15px; font-weight:900; letter-spacing:.05em; text-transform:uppercase; color:var(--green); margin-bottom:10px; }
    .pred-next-head { display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:flex-start; }
    .pred-dayline { font-size:clamp(1.25rem,1.9vw,1.7rem); font-weight:800; color:#0f3c37; }
    .pred-hours { margin-top:4px; color:var(--muted); font-size:1rem; }
    .pred-chip { display:inline-block; padding:7px 14px; border-radius:999px; color:#fff; font-size:.9rem; font-weight:800; box-shadow:0 1px 4px rgba(0,0,0,.12); }
    .pred-chip.manana { background:var(--daychip); color:#2b2400; } .pred-chip.noche { background:var(--night); }
    .pred-next-body { margin-top:14px; display:grid; gap:10px; }
    .pred-point-big { font-size:1.22rem; font-weight:900; color:var(--green); line-height:1.15; }
    .pred-conductor { font-size:1rem; font-weight:600; color:#22353a; }
    .pred-territory-line { font-size:.96rem; font-weight:700; color:#22353a; }
    .pred-program { background:#fff; border:1px solid #d8e0de; border-radius:20px; overflow:hidden; box-shadow:0 2px 10px rgba(0,0,0,.04); }
    .pred-program-head { padding:16px; border-bottom:1px solid #e2e8e6; }
    .pred-program-title { font-size:1.2rem; font-weight:800; color:#113d37; }
    .pred-week-label { margin-top:4px; font-size:.95rem; color:var(--muted); font-weight:700; }
    .pred-days { display:grid; gap:12px; padding:12px; }
    .pred-day-card { background:#fff; border:1px solid #d7e1de; border-radius:18px; overflow:hidden; }
    .pred-day-head { background:var(--green); color:#fff; padding:14px 14px 12px; text-align:center; }
    .pred-day-name { font-size:1.3rem; font-weight:900; letter-spacing:.03em; }
    .pred-day-grid { display:grid; grid-template-columns:1fr 1fr; }
    .pred-shift-col { padding:14px; min-height:120px; }
    .pred-shift-col + .pred-shift-col { border-left:1px solid #e6ecea; }
    .pred-shift-group { display:grid; gap:10px; }
    .pred-shift-top { display:flex; justify-content:space-between; gap:8px; margin-bottom:8px; }
    .pred-shift-time { font-size:.95rem; font-weight:800; color:#22353a; }
    .pred-entry + .pred-entry { border-top:1px solid #e6ecea; padding-top:10px; }
    .pred-shift-point { font-size:1.06rem; font-weight:900; color:var(--green); line-height:1.18; }
    .pred-shift-conductor { margin-top:6px; font-size:.95rem; color:#22353a; font-weight:600; }
    .pred-shift-territory { margin-top:8px; font-size:.93rem; color:#22353a; font-weight:700; }
    .pred-shift-note { display:inline-block; margin-top:8px; background:var(--chip); color:#33444a; border-radius:999px; padding:6px 10px; font-size:.88rem; font-weight:700; }
    .pred-empty { color:var(--muted); font-size:.95rem; font-style:italic; padding-top:8px; }

    /* MAPA SVG INLINE MÁS NÍTIDO */
    .map-wrap { background:#fff; border:1px solid var(--border); border-radius:18px; overflow:hidden; box-shadow:0 2px 10px rgba(0,0,0,.06); }
    .map-toolbar { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:10px 12px; background:#f4f7f6; border-bottom:1px solid #dde5e3; flex-wrap:wrap; }
    .map-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .map-btn { border:1px solid #c9d4d1; background:#fff; color:#1c4a44; padding:8px 12px; border-radius:999px; font-size:14px; font-weight:700; cursor:pointer; }
    .map-btn:hover { background:#f3f7f6; }
    .map-help { color:#516166; font-size:13px; }
    .map-viewport { position:relative; width:100%; height:calc(100vh - 180px); min-height:72vh; background:#edf1f2; overflow:hidden; touch-action:none; }
    .map-inline-host { position:absolute; inset:0; user-select:none; }
    .map-inline-host svg { width:100%; height:100%; display:block; }
    .map-crosshair { position:absolute; inset:auto 12px 12px auto; background:rgba(255,255,255,.92); border:1px solid #d7dfdc; color:#33444a; border-radius:999px; padding:6px 10px; font-size:12px; font-weight:700; pointer-events:none; }
    .map-status { padding:8px 12px 12px; color:#516166; font-size:13px; }

    @media (max-width:760px) {
      .pred-day-grid { grid-template-columns:1fr; }
      .pred-shift-col + .pred-shift-col { border-left:none; border-top:1px solid #e6ecea; }
      .wk-body { padding:14px 18px 20px; }
      .wk-main-title { font-size:clamp(1.8rem,6.2vw,2.55rem); }
      .wk-watch-title { font-size:clamp(1.8rem,5.7vw,2.45rem); }
      .map-viewport { height:calc(100vh - 210px); min-height:68vh; }
    }
    @media (max-width:640px) {
      body { padding:0; }
      .meeting-menu { position:sticky; top:0; z-index:20; background:rgba(237,241,242,.97); padding:10px 8px 8px; margin-bottom:0; backdrop-filter:blur(6px); }
      .card,.pred-program,.pred-next,.wk-card,.map-wrap { border-left:none; border-right:none; box-shadow:none; border-radius:0; }
      .pred-program-head,.pred-days { padding-left:16px; padding-right:16px; }
      .head-nav, .wk-date-nav { grid-template-columns:38px 1fr 38px; gap:6px; }
      .nav-arrow { width:38px; height:38px; font-size:18px; }
      .head-title { font-size:1rem; }
      .wk-date-title { font-size:1.65rem; }
    }
    @media (max-width:470px) {
      .meeting-menu { gap:4px; }
      .meeting-tab { min-height:42px; font-size:11px; padding:7px 3px; overflow:visible; text-overflow:clip; }
      .meeting-tab.wrap-two { white-space:normal; flex-direction:column; align-items:center; justify-content:center; gap:1px; }
      .meeting-tab.wrap-two .topline, .meeting-tab.wrap-two .bottomline { display:block; width:100%; margin:0; text-align:center; line-height:1; }
      .meeting-tab.wrap-two .bottomline { font-size:.9em; }
      .map-btn { padding:7px 10px; font-size:13px; }
      .map-help { font-size:12px; }
    }
    @media (max-width:420px) {
      .meeting-tab { font-size:10px; padding:7px 2px; }
      .meeting-tab.wrap-two .bottomline { font-size:.88em; }
      .pred-day-name { font-size:1.15rem; }
      .pred-dayline { font-size:1.18rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="meeting-menu" role="tablist" aria-label="Tipo de reunión">
      <button class="meeting-tab active" data-view="predicacion" type="button">PREDICACIÓN</button>
      <button class="meeting-tab" data-view="territorio" type="button">MAPA</button>
      <button class="meeting-tab wrap-two" data-view="entresemana" type="button"><span class="topline">VIDA Y</span><span class="bottomline">MINISTERIO</span></button>
      <button class="meeting-tab wrap-two" data-view="findesemana" type="button"><span class="topline">CONFERENCIA</span><span class="bottomline">Y ATALAYA</span></button>
    </div>
    <div class="loading-state" id="loading">Cargando roles…</div>
    <div class="view hidden" id="view-entresemana"></div>
    <div class="view hidden" id="view-findesemana"></div>
    <div class="view active hidden" id="view-predicacion"></div>
    <div class="view hidden" id="view-territorio"></div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxCzMZ59Y4rEC8mR0_eqA3_yxDT1OXRC33CqsIUFgBqu92oDBkV-5V7rzD614NSa7cIhw/exec';
    const TERRITORY_SVG = './mapa-territorio.svg';

    const tabs = Array.from(document.querySelectorAll('.meeting-tab'));
    const views = { entresemana: document.getElementById('view-entresemana'), findesemana: document.getElementById('view-findesemana'), predicacion: document.getElementById('view-predicacion'), territorio: document.getElementById('view-territorio') };
    let midweekWeeks = [], midweekIndex = 0, weekendWeeks = [], weekendIndex = 0;

    function activate(viewName) {
      const valid = views[viewName] ? viewName : 'predicacion';
      tabs.forEach(tab => tab.classList.toggle('active', tab.dataset.view === valid));
      Object.keys(views).forEach(key => views[key].classList.toggle('active', key === valid));
      if (location.hash !== '#' + valid) history.replaceState(null, '', '#' + valid);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    tabs.forEach(tab => tab.addEventListener('click', () => activate(tab.dataset.view)));
    function esc(v) { return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;').replace(/'/g,'&#039;'); }
    function showLoading(isLoading) { document.getElementById('loading').classList.toggle('hidden', !isLoading); Object.values(views).forEach(el => el.classList.toggle('hidden', isLoading)); }
    function showApiError(message, detail='') { showLoading(false); views.predicacion.innerHTML = renderPreaching({ hasData:false, items:[] }); views.territorio.innerHTML = renderTerritorio(); views.entresemana.innerHTML = `<div class="error-state"><strong>${esc(message)}</strong>${detail ? `<small>${esc(detail)}</small>` : ''}</div>`; views.findesemana.innerHTML = `<div class="error-state"><strong>${esc(message)}</strong>${detail ? `<small>${esc(detail)}</small>` : ''}</div>`; activate('predicacion'); }

    function loadData() {
      if (!API_URL) { showApiError('Falta configurar la URL del API.'); return; }
      showLoading(true);
      const callbackName = '__rolesPrefix_' + Date.now();
      const separator = API_URL.includes('?') ? '&' : '?';
      const src = `${API_URL}${separator}prefix=${callbackName}&_ts=${Date.now()}`;
      const script = document.createElement('script'); script.src = src; script.async = true;
      const timeout = setTimeout(() => { cleanup(); showApiError('No se pudo cargar el API.','Se agotó el tiempo de espera.'); }, 15000);
      function cleanup() { clearTimeout(timeout); delete window[callbackName]; if (script.parentNode) script.parentNode.removeChild(script); }
      window[callbackName] = function(data) {
        cleanup();
        if (!data || data.ok !== true) { showApiError('El API respondió con datos inválidos.', JSON.stringify(data || {})); return; }
        renderAll(data); showLoading(false);
        const requested = (location.hash || '').replace('#','').trim().toLowerCase();
        activate(requested || 'predicacion');
      };
      script.onerror = function() { cleanup(); showApiError('Error al cargar el API.','La URL respondió con error.'); };
      document.body.appendChild(script);
    }

    function renderAll(data) {
      initMidweek(data.entresemana || { hasData:false, weeks:[] });
      initWeekend(data.findesemana || { hasData:false, weeks:[] });
      views.predicacion.innerHTML = renderPreaching(data.predicacion || { hasData:false, items:[] });
      views.territorio.innerHTML = renderTerritorio();
      mountSvgViewer();
    }

    function renderItemList(items, cls, lector='') {
      return (items || []).map(it => `<div class="item"><div class="item-title ${cls}">${it.number ? esc(it.number)+'. ' : ''}${esc(it.title || '')}</div>${it.names ? `<div class="item-person">${esc(it.names)}</div>` : ''}${it.isCongBibleStudy && lector ? `<div class="lector-below">Lector:<span class="lector-name"> ${esc(lector)}</span></div>` : ''}</div>`).join('');
    }

    function initMidweek(data) {
      if (!data || !data.hasData || !Array.isArray(data.weeks) || !data.weeks.length) { views.entresemana.innerHTML = '<div class="empty-state">No hay datos cargados para <strong>Vida y Ministerio</strong>.</div>'; return; }
      midweekWeeks = data.weeks.slice(); let idx = midweekWeeks.findIndex(w => w.weekKey === data.currentWeekKey); if (idx < 0) idx = 0; midweekIndex = idx; paintCurrentMidweekWeek();
    }
    function paintCurrentMidweekWeek() {
      const d = midweekWeeks[midweekIndex]; if (!d) return;
      views.entresemana.innerHTML = `<div class="card"><div class="head"><div class="head-nav"><button class="nav-arrow" id="mw-prev" ${midweekIndex === 0 ? 'disabled' : ''}>◀</button><div class="head-title">${esc(d.weekTitle || '')}</div><button class="nav-arrow" id="mw-next" ${midweekIndex === midweekWeeks.length - 1 ? 'disabled' : ''}>▶</button></div></div>${d.president ? `<div class="sub">Presidente: ${esc(d.president)}</div>` : ''}<div class="block"><div class="section-title s-blue">TESOROS DE LA BIBLIA ${d.openingSong ? `<span class="song">Canción ${esc(d.openingSong)}</span>` : ''}</div>${renderItemList(d.treasures, 'blue-t')}<div class="section-title s-gold">SEAMOS MEJORES MAESTROS</div>${renderItemList(d.teachers, 'gold-t')}<div class="section-title s-red">NUESTRA VIDA CRISTIANA ${d.middleSong ? `<span class="song">Canción ${esc(d.middleSong)}</span>` : ''}</div>${renderItemList(d.life, 'red-t', d.lector || '')}</div>${d.closingSong ? `<div class="footer-note">Palabras de conclusión y canción ${esc(d.closingSong)}</div>` : ''}${d.prayerName ? `<div class="footer-prayer">Oración conclusión&nbsp;&nbsp;${esc(d.prayerName)}</div>` : ''}${d.cleaningLabel ? `<div class="cleaning">${esc(d.cleaningLabel)}</div>` : ''}</div>`;
      const prev = document.getElementById('mw-prev'), next = document.getElementById('mw-next');
      if (prev) prev.onclick = () => { if (midweekIndex > 0) { midweekIndex--; paintCurrentMidweekWeek(); } };
      if (next) next.onclick = () => { if (midweekIndex < midweekWeeks.length - 1) { midweekIndex++; paintCurrentMidweekWeek(); } };
    }

    function initWeekend(data) {
      if (!data || !data.hasData || !Array.isArray(data.weeks) || !data.weeks.length) { views.findesemana.innerHTML = '<div class="empty-state">No hay datos cargados para <strong>Conferencia y Atalaya</strong>.</div>'; return; }
      weekendWeeks = data.weeks.slice(); let idx = weekendWeeks.findIndex(w => w.weekKey === data.currentWeekKey); if (idx < 0) idx = 0; weekendIndex = idx; paintCurrentWeekendWeek();
    }
    function supportLine(label, value) { return value ? `<div>${label}:<span>${esc(value)}</span></div>` : ''; }
    function paintCurrentWeekendWeek() {
      const d = weekendWeeks[weekendIndex]; if (!d) return;
      views.findesemana.innerHTML = `<div class="wk-wrap"><div class="wk-card"><div class="wk-date"><div class="wk-date-nav"><button class="nav-arrow" id="wk-prev" ${weekendIndex === 0 ? 'disabled' : ''}>◀</button><div class="wk-date-title">${esc(d.headerTitle || '')}</div><button class="nav-arrow" id="wk-next" ${weekendIndex === weekendWeeks.length - 1 ? 'disabled' : ''}>▶</button></div></div><div class="wk-body">${d.president ? `<div class="wk-president">PRESIDENTE: <span class="name">${esc(d.president)}</span></div>` : ''}${d.publicTalk ? `<div class="wk-band wk-green-band"><div class="wk-band-left"><div class="wk-band-title">DISCURSO PÚBLICO</div></div>${d.publicTalk.song ? `<div class="wk-band-song">Canción ${esc(d.publicTalk.song)}</div>` : ''}</div><div class="wk-main-title">“${esc(d.publicTalk.title || '')}”</div>${d.publicTalk.speaker ? `<div class="wk-main-speaker">${esc(d.publicTalk.speaker)}</div>` : ''}${d.publicTalk.subtitle ? `<div class="wk-main-sub">${esc(d.publicTalk.subtitle)}</div>` : ''}` : ''}${d.watchtower ? `<div class="wk-band wk-red-band"><div class="wk-band-left"><div class="wk-band-title">REUNIÓN LA ATALAYA</div></div>${d.watchtower.song ? `<div class="wk-band-song">Canción ${esc(d.watchtower.song)}</div>` : ''}</div><div class="wk-watch-title">“${esc(d.watchtower.title || '')}”</div>${d.watchtower.conductor ? `<div class="wk-watch-conductor">${esc(d.watchtower.conductor)}</div>` : ''}${d.watchtower.lector ? `<div class="wk-watch-lector">Lector: ${esc(d.watchtower.lector)}</div>` : ''}` : ''}${d.closingSong ? `<div class="wk-foot-song">Canción ${esc(d.closingSong)}</div>` : ''}${d.cleaningLabel ? `<div class="wk-cleaning">${esc(d.cleaningLabel)}</div>` : ''}<div class="wk-support">${supportLine('Acomodadores', d.support && d.support.acomodadores)}${supportLine('Micrófonos', d.support && d.support.microfonos)}${supportLine('Hospitalidad', d.support && d.support.hospitalidad)}</div></div></div></div>`;
      const prev = document.getElementById('wk-prev'), next = document.getElementById('wk-next');
      if (prev) prev.onclick = () => { if (weekendIndex > 0) { weekendIndex--; paintCurrentWeekendWeek(); } };
      if (next) next.onclick = () => { if (weekendIndex < weekendWeeks.length - 1) { weekendIndex++; paintCurrentWeekendWeek(); } };
    }

    const DAY_ORDER = ['lunes','martes','miercoles','jueves','viernes','sabado','domingo'];
    const DAY_LABEL = { lunes:'Lunes', martes:'Martes', miercoles:'Miércoles', jueves:'Jueves', viernes:'Viernes', sabado:'Sábado', domingo:'Domingo' };
    function normText(v) { return String(v ?? '').normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim().toLowerCase(); }
    function toMinutes(hhmm) { if (!hhmm) return null; const p = String(hhmm).split(':'); if (p.length < 2) return null; const h = Number(p[0]), m = Number(p[1]); if (Number.isNaN(h) || Number.isNaN(m)) return null; return h*60 + m; }
    function formatTimeRange(item) { if (item.horaTexto) return item.horaTexto; if (item.horaInicioTexto && item.horaFinTexto) return `${item.horaInicioTexto} - ${item.horaFinTexto}`; return ''; }
    function getGroupNumber(point) { const m = String(point || '').match(/grupo\s*(\d+)/i); return m ? Number(m[1]) : null; }
    function isGroupPoint(point) { return getGroupNumber(point) !== null; }
    function normalizeGroupLabel(point) { const n = getGroupNumber(point); return n === null ? (point || '') : `GRUPO ${n}`; }
    function comparePredShiftItems(a, b) {
      const ga = getGroupNumber(a.puntoReunion), gb = getGroupNumber(b.puntoReunion);
      if (ga !== null && gb !== null && ga !== gb) return ga - gb;
      if (ga !== null && gb === null) return -1;
      if (ga === null && gb !== null) return 1;
      const ta = toMinutes(a.horaInicio || '') ?? 9999, tb = toMinutes(b.horaInicio || '') ?? 9999;
      if (ta !== tb) return ta - tb;
      return String(a.puntoReunion || '').localeCompare(String(b.puntoReunion || ''));
    }
    function preprocessPredication(raw) {
      const items = Array.isArray(raw.items) ? raw.items : [];
      return items.map((it, idx) => {
        const start = toMinutes(it.horaInicio || '');
        const shiftNorm = normText(it.turno || (start !== null && start < 720 ? 'Mañana' : 'Noche'));
        return { id: it.id || `p${idx}`, dia: it.dia || '', diaNorm: normText(it.dia || ''), fechaISO: it.fechaISO || it.fecha || '', turno: it.turno || (shiftNorm.includes('noche') ? 'Noche' : 'Mañana'), turnoNorm: shiftNorm.includes('noche') ? 'noche' : 'mañana', horaInicio: it.horaInicio || '', horaFin: it.horaFin || '', horaInicioTexto: it.horaInicioTexto || '', horaFinTexto: it.horaFinTexto || '', horaTexto: it.horaTexto || '', puntoReunion: it.puntoReunion || it.punto || '', conductor: it.conductor || '', territorio: it.territorio || '', notas: it.notas || '' };
      }).sort((a,b) => (a.fechaISO || '').localeCompare(b.fechaISO || '') || comparePredShiftItems(a,b));
    }
    function isMeetingBlock(it) { return normText(it.puntoReunion || '').includes('vida y ministerio'); }
    function getPredChip(turnoNorm) { return `<span class="pred-chip ${turnoNorm === 'noche' ? 'noche' : 'manana'}">${turnoNorm === 'noche' ? 'Noche' : 'Mañana'}</span>`; }
    function getHeadline(items) {
      if (!items.length) return null; const now = new Date(), todayISO = now.toISOString().slice(0,10), mins = now.getHours()*60 + now.getMinutes();
      const active = items.find(it => it.fechaISO === todayISO && it.horaInicio && it.horaFin && mins >= toMinutes(it.horaInicio) && mins < toMinutes(it.horaFin));
      if (active) return { mode:'activo', item:active };
      const upcomingToday = items.find(it => it.fechaISO === todayISO && it.horaInicio && mins < toMinutes(it.horaInicio));
      if (upcomingToday) return { mode:'proximo', item:upcomingToday };
      const future = items.find(it => (it.fechaISO || '') > todayISO || ((it.fechaISO || '') === todayISO && it.horaInicio && mins < toMinutes(it.horaInicio)));
      return { mode:'proximo', item: future || items[0] };
    }
    function renderPredEntry(it) {
      const meeting = isMeetingBlock(it), group = isGroupPoint(it.puntoReunion || '');
      if (group) return `<div class="pred-entry"><div class="pred-shift-point">${esc(normalizeGroupLabel(it.puntoReunion || ''))}</div>${it.territorio ? `<div class="pred-shift-territory">${esc(it.territorio)}</div>` : ''}${it.notas ? `<span class="pred-shift-note">${esc(it.notas)}</span>` : ''}</div>`;
      return `<div class="pred-entry"><div class="pred-shift-point">${esc(it.puntoReunion || '')}</div>${!meeting && it.conductor ? `<div class="pred-shift-conductor">${esc(it.conductor)}</div>` : ''}${!meeting && it.territorio ? `<div class="pred-shift-territory">Territorio: ${esc(it.territorio)}</div>` : ''}${!meeting && it.notas ? `<span class="pred-shift-note">${esc(it.notas)}</span>` : ''}</div>`;
    }
    function renderPredShiftList(items, shiftNorm) {
      if (!items || !items.length) return '<div class="pred-empty">Sin turno</div>';
      const sorted = items.slice().sort(comparePredShiftItems), first = sorted[0];
      return `<div class="pred-shift-top">${getPredChip(shiftNorm)}<div class="pred-shift-time">${esc(formatTimeRange(first))}</div></div><div class="pred-shift-group">${sorted.map(renderPredEntry).join('')}</div>`;
    }
    function renderPreaching(d) {
      const items = preprocessPredication(d || { hasData:false, items:[] }), weekLabel = d && d.semanaTexto ? d.semanaTexto : '', headline = getHeadline(items);
      const top = headline ? (() => { const it = headline.item, meeting = isMeetingBlock(it), group = isGroupPoint(it.puntoReunion || ''); return `<div class="pred-next"><div class="pred-next-label">${headline.mode === 'activo' ? 'Turno actual' : 'Próxima predicación'}</div><div class="pred-next-head"><div><div class="pred-dayline">${esc(it.dia || '')}</div><div class="pred-hours">${esc(formatTimeRange(it))}</div></div>${getPredChip(it.turnoNorm)}</div><div class="pred-next-body"><div class="pred-point-big">${esc(group ? normalizeGroupLabel(it.puntoReunion || '') : (it.puntoReunion || 'Sin definir'))}</div>${group ? (it.territorio ? `<div class="pred-territory-line">${esc(it.territorio)}</div>` : '') : (!meeting && it.conductor ? `<div class="pred-conductor">${esc(it.conductor)}</div>` : '')}${!group && !meeting && it.territorio ? `<div class="pred-territory-line">Territorio: ${esc(it.territorio)}</div>` : ''}${!meeting && it.notas ? `<span class="pred-shift-note">${esc(it.notas)}</span>` : ''}</div></div>`; })() : `<div class="pred-next"><div class="pred-next-label">Próxima predicación</div><div class="empty-state">No hay turnos cargados todavía.</div></div>`;
      const grouped = Object.fromEntries(DAY_ORDER.map(day => [day, { manana:[], noche:[] }]));
      items.forEach(it => { if (!grouped[it.diaNorm]) return; if (it.turnoNorm === 'mañana') grouped[it.diaNorm].manana.push(it); if (it.turnoNorm === 'noche') grouped[it.diaNorm].noche.push(it); });
      const daysHtml = DAY_ORDER.map(day => { const g = grouped[day]; return `<div class="pred-day-card"><div class="pred-day-head"><div class="pred-day-name">${DAY_LABEL[day]}</div></div><div class="pred-day-grid"><div class="pred-shift-col">${renderPredShiftList(g.manana, 'mañana')}</div><div class="pred-shift-col">${renderPredShiftList(g.noche, 'noche')}</div></div></div>`; }).join('');
      return `<div class="pred-wrap">${top}<div class="pred-program"><div class="pred-program-head"><div><div class="pred-program-title">Programa completo de predicación</div>${weekLabel ? `<div class="pred-week-label">${esc(weekLabel)}</div>` : ''}</div></div><div class="pred-days">${daysHtml || '<div class="empty-state">No hay turnos de predicación cargados todavía.</div>'}</div></div></div>`;
    }

    function renderTerritorio() {
      return `<div class="map-wrap"><div class="map-toolbar"><div class="map-actions"><button class="map-btn" id="map-zoom-out" type="button">−</button><button class="map-btn" id="map-zoom-in" type="button">+</button><button class="map-btn" id="map-fit" type="button">Ajustar</button><button class="map-btn" id="map-reset" type="button">100%</button></div><div class="map-help">Zoom vectorial real: dos dedos para acercar/alejar o arrastra para moverte.</div></div><div class="map-viewport" id="map-viewport"><div class="map-inline-host" id="map-inline-host"></div><div class="map-crosshair" id="map-crosshair">Vector</div></div><div class="map-status" id="map-status">Cargando mapa SVG…</div></div>`;
    }

    async function mountSvgViewer() {
      const viewport = document.getElementById('map-viewport');
      const host = document.getElementById('map-inline-host');
      const status = document.getElementById('map-status');
      if (!viewport || !host || !status) return;

      let text = '';
      try {
        const res = await fetch(TERRITORY_SVG, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        text = await res.text();
      } catch (err) {
        status.textContent = 'No se pudo cargar mapa-territorio.svg. Súbelo junto al index.html en la misma carpeta.';
        return;
      }

      const parser = new DOMParser();
      const doc = parser.parseFromString(text, 'image/svg+xml');
      const svg = doc.documentElement;
      if (!svg || svg.nodeName.toLowerCase() !== 'svg') {
        status.textContent = 'El archivo mapa-territorio.svg no parece ser un SVG válido.';
        return;
      }
      host.innerHTML = '';
      host.appendChild(svg);
      svg.setAttribute('width', '100%');
      svg.setAttribute('height', '100%');
      svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
      svg.style.display = 'block';
      svg.style.touchAction = 'none';

      const vbAttr = svg.getAttribute('viewBox');
      let orig = null;
      if (vbAttr) {
        const vals = vbAttr.trim().split(/[ ,]+/).map(Number);
        if (vals.length === 4 && vals.every(v => !Number.isNaN(v))) orig = { x: vals[0], y: vals[1], w: vals[2], h: vals[3] };
      }
      if (!orig) {
        const w = parseFloat(svg.getAttribute('width')) || svg.viewBox.baseVal.width || 1000;
        const h = parseFloat(svg.getAttribute('height')) || svg.viewBox.baseVal.height || 1000;
        orig = { x: 0, y: 0, w, h };
        svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
      }

      const state = {
        orig,
        current: { ...orig },
        minScale: 1,
        maxScale: 30,
        pointers: new Map(),
        dragging: false,
        start: null,
        base: null,
        pinchStartDistance: 0,
        pinchStartRect: null
      };

      function svgScalePxPerUnit() {
        const vw = viewport.clientWidth, vh = viewport.clientHeight;
        return Math.min(vw / state.current.w, vh / state.current.h);
      }
      function renderedMetrics() {
        const vw = viewport.clientWidth, vh = viewport.clientHeight;
        const scale = svgScalePxPerUnit();
        const rw = state.current.w * scale, rh = state.current.h * scale;
        const ox = (vw - rw) / 2, oy = (vh - rh) / 2;
        return { scale, rw, rh, ox, oy, vw, vh };
      }
      function pointToSvg(clientX, clientY) {
        const rect = viewport.getBoundingClientRect();
        const localX = clientX - rect.left, localY = clientY - rect.top;
        const m = renderedMetrics();
        return {
          x: state.current.x + (localX - m.ox) / m.scale,
          y: state.current.y + (localY - m.oy) / m.scale
        };
      }
      function updateStatus() {
        const zoomPct = Math.round((state.orig.w / state.current.w) * 100);
        status.textContent = `Zoom: ${zoomPct}%`; }
      function clampRect() {
        const c = state.current, o = state.orig;
        if (c.w <= o.w) {
          c.x = Math.max(o.x, Math.min(o.x + o.w - c.w, c.x));
        } else {
          c.x = o.x - (c.w - o.w) / 2;
        }
        if (c.h <= o.h) {
          c.y = Math.max(o.y, Math.min(o.y + o.h - c.h, c.y));
        } else {
          c.y = o.y - (c.h - o.h) / 2;
        }
      }
      function applyViewBox() {
        clampRect();
        svg.setAttribute('viewBox', `${state.current.x} ${state.current.y} ${state.current.w} ${state.current.h}`);
        updateStatus();
      }
      function fitAll() { state.current = { ...state.orig }; applyViewBox(); }
      function resetNative() { fitAll(); }
      function zoomAt(factor, svgX, svgY) {
        const targetW = Math.max(state.orig.w / state.maxScale, Math.min(state.orig.w / state.minScale, state.current.w / factor));
        const targetH = state.current.h * (targetW / state.current.w);
        const relX = (svgX - state.current.x) / state.current.w;
        const relY = (svgY - state.current.y) / state.current.h;
        state.current.x = svgX - relX * targetW;
        state.current.y = svgY - relY * targetH;
        state.current.w = targetW; state.current.h = targetH;
        applyViewBox();
      }
      function currentZoomFactor() { return state.orig.w / state.current.w; }
      function centerSvgPoint() { return { x: state.current.x + state.current.w / 2, y: state.current.y + state.current.h / 2 }; }

      viewport.addEventListener('wheel', (e) => {
        e.preventDefault();
        const p = pointToSvg(e.clientX, e.clientY);
        zoomAt(e.deltaY < 0 ? 1.12 : 1 / 1.12, p.x, p.y);
      }, { passive:false });

      viewport.addEventListener('dblclick', (e) => {
        const p = pointToSvg(e.clientX, e.clientY);
        zoomAt(1.7, p.x, p.y);
      });

      function pointerDistance() {
        const vals = Array.from(state.pointers.values()); if (vals.length < 2) return 0;
        const dx = vals[0].x - vals[1].x, dy = vals[0].y - vals[1].y; return Math.hypot(dx, dy);
      }
      function pointerCenter() {
        const vals = Array.from(state.pointers.values());
        const x = vals.reduce((s,p)=>s+p.x,0)/vals.length, y = vals.reduce((s,p)=>s+p.y,0)/vals.length;
        return { x, y };
      }

      viewport.addEventListener('pointerdown', (e) => {
        viewport.setPointerCapture(e.pointerId);
        state.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
        if (state.pointers.size === 1) {
          state.dragging = true;
          state.start = { x: e.clientX, y: e.clientY };
          state.base = { ...state.current };
        } else if (state.pointers.size === 2) {
          state.dragging = false;
          state.pinchStartDistance = pointerDistance();
          state.pinchStartRect = { ...state.current };
        }
      });

      viewport.addEventListener('pointermove', (e) => {
        if (!state.pointers.has(e.pointerId)) return;
        state.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

        if (state.pointers.size === 2) {
          const dist = pointerDistance();
          if (!state.pinchStartDistance || !state.pinchStartRect) return;
          const center = pointerCenter();
          const centerSvg = pointToSvg(center.x, center.y);
          state.current = { ...state.pinchStartRect };
          const factor = dist / state.pinchStartDistance;
          const startW = state.pinchStartRect.w;
          const targetW = Math.max(state.orig.w / state.maxScale, Math.min(state.orig.w / state.minScale, startW / factor));
          const targetH = state.pinchStartRect.h * (targetW / state.pinchStartRect.w);
          const relX = (centerSvg.x - state.pinchStartRect.x) / state.pinchStartRect.w;
          const relY = (centerSvg.y - state.pinchStartRect.y) / state.pinchStartRect.h;
          state.current.x = centerSvg.x - relX * targetW;
          state.current.y = centerSvg.y - relY * targetH;
          state.current.w = targetW; state.current.h = targetH;
          applyViewBox();
          return;
        }

        if (state.dragging && state.start && state.base) {
          state.current = { ...state.base };
          const m = renderedMetrics();
          const dxUnit = (e.clientX - state.start.x) / m.scale;
          const dyUnit = (e.clientY - state.start.y) / m.scale;
          state.current.x = state.base.x - dxUnit;
          state.current.y = state.base.y - dyUnit;
          applyViewBox();
        }
      });

      function endPointer(e) {
        state.pointers.delete(e.pointerId);
        if (state.pointers.size < 2) { state.pinchStartDistance = 0; state.pinchStartRect = null; }
        if (!state.pointers.size) { state.dragging = false; state.start = null; state.base = null; }
      }
      viewport.addEventListener('pointerup', endPointer);
      viewport.addEventListener('pointercancel', endPointer);
      viewport.addEventListener('pointerleave', endPointer);

      document.getElementById('map-zoom-in')?.addEventListener('click', () => { const c = centerSvgPoint(); zoomAt(1.25, c.x, c.y); });
      document.getElementById('map-zoom-out')?.addEventListener('click', () => { const c = centerSvgPoint(); zoomAt(1 / 1.25, c.x, c.y); });
      document.getElementById('map-fit')?.addEventListener('click', fitAll);
      document.getElementById('map-reset')?.addEventListener('click', resetNative);
      window.addEventListener('resize', applyViewBox);

      fitAll();
      status.textContent = `Zoom: ${Math.round(currentZoomFactor() * 100)}%`;
    }

    loadData();
  </script>
</body>
</html>
