<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roles semanales</title>
  <style>
    :root {
      --green-dark: #0b6e63;
      --green-soft: #d9ddda;
      --green-border: #2c7b70;
      --blue: #3c7f8f;
      --blue-line: #4f8d98;
      --gold: #a87d10;
      --gold-line: #b18a18;
      --red: #a51f27;
      --red-line: #b13338;
      --paper: #f5f5f3;
      --border: #d8d8d4;
      --text: #152128;
      --tab-bg: #e9edeb;
    }
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; }
    body {
      background:#edf1f2;
      color:var(--text);
      font-family: Arial, Helvetica, sans-serif;
      padding:14px;
    }
    .app { max-width: 860px; margin: 0 auto; }
    .meeting-menu { display:flex; gap:8px; flex-wrap:wrap; margin:0 0 12px; }
    .meeting-tab {
      border:1px solid #cfd6d8; background:var(--tab-bg); color:#23443f;
      padding:10px 14px; border-radius:999px; font-size:14px; font-weight:700; cursor:pointer;
    }
    .meeting-tab.active { background:var(--green-dark); color:white; border-color:var(--green-dark); box-shadow:0 2px 8px rgba(11,110,99,.18); }
    .toolbar { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:10px; }
    .status { font-size:13px; color:#496168; }
    .reload-btn { border:none; background:#dfe8e6; color:#18413b; padding:8px 12px; border-radius:999px; cursor:pointer; font-weight:700; }
    .view { display:none; }
    .view.active { display:block; }

    .page { width:100%; background:var(--paper); border:1px solid var(--border); box-shadow:0 2px 10px rgba(0,0,0,.06); overflow:hidden; }
    .header { background:var(--green-dark); color:white; padding:14px 24px 10px; font-size:clamp(1.55rem,2.2vw,2.05rem); line-height:1.15; font-weight:500; overflow-wrap:anywhere; }
    .president { background:var(--green-soft); padding:6px 24px 8px; color:var(--green-dark); font-size:clamp(1rem,1.5vw,1.32rem); font-weight:700; }
    .section { padding:0 24px; }
    .section-header { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:10px; margin-bottom:8px; padding-bottom:6px; border-bottom-width:3px; border-bottom-style:solid; }
    .section-header-left { display:flex; align-items:center; gap:12px; min-width:0; }
    .icon-box { width:38px; height:38px; flex:0 0 38px; display:inline-flex; align-items:center; justify-content:center; }
    .icon-box svg { width:38px; height:38px; display:block; }
    .section-title { font-size:clamp(1.12rem,1.6vw,1.84rem); font-weight:700; text-transform:uppercase; line-height:1.1; }
    .song { font-size:clamp(1rem,1.3vw,1.28rem); font-weight:700; white-space:nowrap; line-height:1.1; text-align:right; }
    .blue .section-header { border-bottom-color:var(--blue-line); }
    .gold .section-header { border-bottom-color:var(--gold-line); }
    .red .section-header { border-bottom-color:var(--red-line); }
    .blue .section-title, .blue .song { color:var(--blue); }
    .gold .section-title, .gold .song { color:var(--gold); }
    .red .section-title, .red .song { color:var(--red); }
    .items { padding-left:22px; padding-bottom:2px; }
    .item { margin:10px 0 8px; }
    .item-title { font-size:clamp(1.08rem,1.4vw,1.7rem); font-weight:700; line-height:1.22; overflow-wrap:anywhere; }
    .blue .item-title { color:var(--blue); }
    .gold .item-title { color:var(--gold); }
    .red .item-title { color:var(--red); }
    .item-person { margin-top:6px; margin-left:16px; color:#111; font-size:clamp(1.08rem,1.4vw,1.68rem); line-height:1.22; overflow-wrap:anywhere; }
    .lector-inline { display:inline-block; margin-left:24px; color:var(--red); font-size:clamp(1rem,1.2vw,1.4rem); font-weight:700; white-space:nowrap; }
    .lector-inline .lector-name { color:#111; font-weight:400; margin-left:4px; }
    .footer-note { text-align:right; padding:8px 24px 0; color:var(--green-dark); font-size:clamp(1.05rem,1.3vw,1.55rem); font-weight:700; }
    .footer-prayer { text-align:right; padding:5px 24px 0; color:var(--green-dark); font-size:clamp(1rem,1.15vw,1.42rem); font-weight:700; }
    .cleaning { padding:15px 24px 18px; color:var(--green-dark); font-size:clamp(1.22rem,1.7vw,1.95rem); font-weight:800; }

    .weekend-wrap { max-width:620px; margin:0 auto; }
    .weekend-card { background:#f7f6f2; border:1.8px solid var(--green-border); border-radius:0 0 38px 38px; overflow:hidden; }
    .weekend-top { background:#dde2dd; color:var(--green-dark); text-align:center; font-size:clamp(1.4rem,2vw,2rem); font-weight:700; padding:12px 18px 10px; border-bottom:1.4px solid var(--green-border); }
    .weekend-body { padding:12px 34px 20px; }
    .weekend-president { color:var(--green-dark); font-size:clamp(1rem,1.3vw,1.35rem); font-weight:700; margin-bottom:14px; line-height:1.25; }
    .weekend-president .name { color:#295d57; font-weight:400; }
    .wk-section-header { display:flex; align-items:center; justify-content:space-between; gap:12px; padding-bottom:4px; border-bottom:2.5px solid; margin-top:10px; }
    .wk-left { display:flex; align-items:center; gap:12px; min-width:0; }
    .wk-icon { width:52px; height:28px; flex:0 0 52px; }
    .wk-icon svg { width:52px; height:28px; display:block; }
    .wk-title { font-weight:800; text-transform:uppercase; font-size:clamp(1rem,1.2vw,1.4rem); line-height:1.1; }
    .wk-song { font-size:clamp(.98rem,1.1vw,1.2rem); font-weight:700; white-space:nowrap; }
    .wk-green { color:var(--green-dark); border-color:var(--green-border); }
    .wk-red { color:var(--red); border-color:#bc555a; }
    .wk-talk-title { color:var(--green-dark); text-align:center; font-size:clamp(2rem,3.4vw,3.15rem); font-weight:700; line-height:1.16; margin:24px auto 10px; }
    .wk-speaker { text-align:center; color:#1a5c57; font-size:clamp(1.35rem,2vw,2.1rem); margin-top:8px; }
    .wk-subtitle { text-align:center; color:#2f625b; font-size:clamp(1.05rem,1.5vw,1.45rem); margin-top:2px; margin-bottom:8px; }
    .wk-watchtower-title { color:var(--red); text-align:center; font-size:clamp(1.55rem,2.3vw,2.5rem); font-weight:700; line-height:1.15; margin:18px auto 8px; }
    .wk-watchtower-conductor { text-align:center; color:#7d1c23; font-size:clamp(1.3rem,1.9vw,1.9rem); margin:10px 0 18px; }
    .wk-bottom-song { text-align:right; color:var(--green-dark); font-weight:700; font-size:clamp(1rem,1.25vw,1.3rem); margin-top:10px; }
    .wk-cleaning { text-align:right; color:var(--green-dark); font-size:clamp(1.5rem,2.1vw,2.25rem); font-weight:800; margin-top:8px; }

    .empty-state, .loading-state {
      background:#fff; border:1px dashed #cad2d6; border-radius:20px; padding:28px 20px; text-align:center; color:#506067; font-size:16px;
    }
    .hidden { display:none !important; }

    @media (max-width:640px) {
      body { padding:0; }
      .meeting-menu { position:sticky; top:0; z-index:20; background:rgba(237,241,242,.97); padding:10px 12px 8px; margin-bottom:0; backdrop-filter:blur(6px); }
      .meeting-tab { flex:1 1 calc(50% - 8px); min-width:148px; text-align:center; }
      .toolbar { padding:10px 12px; margin:0; }
      .page { border:none; box-shadow:none; min-height:calc(100vh - 104px); }
      .header { padding:14px 16px 10px; }
      .president, .section, .footer-note, .footer-prayer, .cleaning { padding-left:16px; padding-right:16px; }
      .section-header { flex-direction:column; align-items:flex-start; gap:8px; }
      .song { text-align:left; margin-left:50px; white-space:normal; }
      .items { padding-left:6px; }
      .item-person { margin-left:14px; }
      .lector-inline { display:block; margin-left:0; margin-top:6px; white-space:normal; }
      .footer-note, .footer-prayer { text-align:left; }
      .weekend-card { border-left:none; border-right:none; border-top:none; border-radius:0 0 26px 26px; }
      .weekend-body { padding:12px 16px 18px; }
    }
    @media (max-width:420px) {
      .meeting-tab { flex:1 1 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="meeting-menu" role="tablist" aria-label="Tipo de reunión">
      <button class="meeting-tab active" data-view="entresemana" type="button">REUNIÓN ENTRESEMANA</button>
      <button class="meeting-tab" data-view="findesemana" type="button">REUNIÓN FIN DE SEMANA</button>
      <button class="meeting-tab" data-view="predicacion" type="button">PREDICACIÓN</button>
    </div>

    <div class="toolbar">
      <div class="status" id="status">Cargando datos…</div>
      <button class="reload-btn" id="reloadBtn" type="button">Actualizar</button>
    </div>

    <div class="loading-state" id="loading">Cargando roles…</div>

    <div class="view active hidden" id="view-entresemana"></div>
    <div class="view hidden" id="view-findesemana"></div>
    <div class="view hidden" id="view-predicacion"></div>
  </div>

  <script>
    // 1) Pega aquí la URL /exec de tu Apps Script API
    const API_URL = 'https://script.google.com/macros/s/AKfycbw9Mx8X2xy1Zw4-31Ba79U_-idZs2N2QpEGrRlbrd2z3cLoWA_TgB0HeabU7ZnmNBtJpQ/exec';

    let payload = null;

    const tabs = Array.from(document.querySelectorAll('.meeting-tab'));
    const views = {
      entresemana: document.getElementById('view-entresemana'),
      findesemana: document.getElementById('view-findesemana'),
      predicacion: document.getElementById('view-predicacion')
    };

    function activate(viewName) {
      const valid = views[viewName] ? viewName : 'entresemana';
      tabs.forEach(tab => tab.classList.toggle('active', tab.dataset.view === valid));
      Object.keys(views).forEach(key => views[key].classList.toggle('active', key === valid));
      if (location.hash !== '#' + valid) {
        history.replaceState(null, '', '#' + valid);
      }
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    tabs.forEach(tab => tab.addEventListener('click', () => activate(tab.dataset.view)));

    document.getElementById('reloadBtn').addEventListener('click', () => loadData(true));

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    function showLoading(isLoading) {
      document.getElementById('loading').classList.toggle('hidden', !isLoading);
      Object.values(views).forEach(el => el.classList.toggle('hidden', isLoading));
    }

    function loadData(forceBust = false) {
      if (!API_URL || API_URL.includes('PEGA_AQUI')) {
        showLoading(false);
        setStatus('Falta configurar la URL del API en index.html');
        views.entresemana.innerHTML = `<div class="empty-state">Edita <strong>index.html</strong> y pega tu URL <strong>/exec</strong> en la constante <strong>API_URL</strong>.</div>`;
        activate('entresemana');
        return;
      }

      showLoading(true);
      setStatus('Consultando Google Sheets…');

      const callbackName = '__rolesCallback_' + Date.now();
      const separator = API_URL.includes('?') ? '&' : '?';
      const bust = forceBust ? '&_ts=' + Date.now() : '';
      const src = `${API_URL}${separator}callback=${callbackName}${bust}`;

      const script = document.createElement('script');
      script.src = src;
      script.async = true;

      const timeout = setTimeout(() => {
        cleanup();
        showLoading(false);
        setStatus('No se pudo cargar el API. Revisa la URL o la implementación.');
        views.entresemana.innerHTML = '<div class="empty-state">No se pudo cargar la información desde Apps Script.</div>';
        activate('entresemana');
      }, 12000);

      function cleanup() {
        clearTimeout(timeout);
        delete window[callbackName];
        if (script.parentNode) script.parentNode.removeChild(script);
      }

      window[callbackName] = function(data) {
        cleanup();
        payload = data;
        renderAll(data);
        const generated = data && data.generatedAt ? new Date(data.generatedAt).toLocaleString('es-PE') : 'actualizado';
        setStatus(`Datos cargados · ${generated}`);
        showLoading(false);
        const requested = (location.hash || '').replace('#', '').trim().toLowerCase();
        activate(requested || 'entresemana');
      };

      script.onerror = function() {
        cleanup();
        showLoading(false);
        setStatus('Error al cargar el API.');
        views.entresemana.innerHTML = '<div class="empty-state">Error al cargar el API de Apps Script.</div>';
        activate('entresemana');
      };

      document.body.appendChild(script);
    }

    function renderAll(data) {
      views.entresemana.innerHTML = renderMidweek(data.entresemana || { hasData:false });
      views.findesemana.innerHTML = renderWeekend(data.findesemana || { hasData:false });
      views.predicacion.innerHTML = renderPreaching(data.predicacion || { hasData:false });
    }

    function esc(v) {
      return String(v ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function renderItems(items, colorClass, lectorName='') {
      return (items || []).map(item => `
        <div class="item">
          <div class="item-title">
            ${item.number ? esc(item.number) + '. ' : ''}${esc(item.title || '')}
            ${item.isCongBibleStudy && lectorName ? `<span class="lector-inline">Lector: <span class="lector-name">${esc(lectorName)}</span></span>` : ''}
          </div>
          ${item.names ? `<div class="item-person">${esc(item.names)}</div>` : ''}
        </div>
      `).join('');
    }

    function renderMidweek(d) {
      if (!d.hasData) {
        return '<div class="empty-state">No hay datos cargados para <strong>Reunión Entresemana</strong> en la semana actual.</div>';
      }
      return `
        <div class="page">
          <div class="header">${esc(d.weekTitle)}</div>
          ${d.president ? `<div class="president">Presidente: ${esc(d.president)}</div>` : ''}

          <section class="section blue">
            <div class="section-header">
              <div class="section-header-left">
                <div class="icon-box"><svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><rect width="48" height="48" fill="#3c7f8f"/><path d="M11 18 L17 11 H31 L37 18 L24 35 Z" fill="none" stroke="#fff" stroke-width="2.2" stroke-linejoin="round"/><path d="M11 18 H37" fill="none" stroke="#fff" stroke-width="2"/><path d="M17 11 L24 18 L31 11" fill="none" stroke="#fff" stroke-width="2" stroke-linejoin="round"/><path d="M17 11 L20 18 L24 35" fill="none" stroke="#fff" stroke-width="2"/><path d="M31 11 L28 18 L24 35" fill="none" stroke="#fff" stroke-width="2"/></svg></div>
                <div class="section-title">TESOROS DE LA BIBLIA</div>
              </div>
              ${d.openingSong ? `<div class="song">Canción ${esc(d.openingSong)}</div>` : ''}
            </div>
            <div class="items">${renderItems(d.treasures || [], 'blue')}</div>
          </section>

          <section class="section gold">
            <div class="section-header">
              <div class="section-header-left">
                <div class="icon-box"><svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><rect width="48" height="48" fill="#a87d10"/><path d="M24 10 L24 37" fill="none" stroke="#fff" stroke-width="2.3" stroke-linecap="round"/><path d="M24 14 C20 14,18 16,18 18 C22 18,24 16,24 14 Z" fill="none" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/><path d="M24 18 C28 18,30 20,30 22 C26 22,24 20,24 18 Z" fill="none" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/><path d="M24 22 C20 22,18 24,18 26 C22 26,24 24,24 22 Z" fill="none" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/><path d="M24 26 C28 26,30 28,30 30 C26 30,24 28,24 26 Z" fill="none" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/><path d="M24 30 C20 30,18 32,18 34 C22 34,24 32,24 30 Z" fill="none" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/></svg></div>
                <div class="section-title">SEAMOS MEJORES MAESTROS</div>
              </div>
            </div>
            <div class="items">${renderItems(d.teachers || [], 'gold')}</div>
          </section>

          <section class="section red">
            <div class="section-header">
              <div class="section-header-left">
                <div class="icon-box"><svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><rect width="48" height="48" fill="#a51f27"/><path d="M12 29 C12 23,16 20,21 20 H29 C34 20,37 23,37 28 V31 H34 V35 H31 V31 H18 V35 H15 V31 H12 Z" fill="none" stroke="#fff" stroke-width="2" stroke-linejoin="round"/><circle cx="34.5" cy="17.5" r="3" fill="none" stroke="#fff" stroke-width="2"/><path d="M26 20 L31 17" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/><path d="M15 20 L18 16 L19 20" fill="none" stroke="#fff" stroke-width="2" stroke-linejoin="round"/><path d="M22 17 L24 14 L26 17" fill="none" stroke="#fff" stroke-width="2" stroke-linejoin="round"/></svg></div>
                <div class="section-title">NUESTRA VIDA CRISTIANA</div>
              </div>
              ${d.middleSong ? `<div class="song">Canción ${esc(d.middleSong)}</div>` : ''}
            </div>
            <div class="items">${renderItems(d.life || [], 'red', d.lector || '')}</div>
          </section>

          ${d.closingSong ? `<div class="footer-note">Palabras de conclusión y canción ${esc(d.closingSong)}</div>` : ''}
          ${d.prayerName ? `<div class="footer-prayer">Oración conclusión&nbsp;&nbsp;${esc(d.prayerName)}</div>` : ''}
          ${d.cleaningLabel ? `<div class="cleaning">${esc(d.cleaningLabel)}</div>` : ''}
        </div>`;
    }

    function renderWeekend(d) {
      if (!d.hasData) {
        return '<div class="empty-state">No hay datos cargados para <strong>Reunión Fin de Semana</strong> en la semana actual.</div>';
      }
      return `
        <div class="weekend-wrap">
          <div class="weekend-card">
            <div class="weekend-top">${esc(d.headerTitle || '')}</div>
            <div class="weekend-body">
              ${d.president ? `<div class="weekend-president">PRESIDENTE: <span class="name">${esc(d.president)}</span></div>` : ''}

              ${d.publicTalk ? `
                <div class="wk-section-header wk-green">
                  <div class="wk-left">
                    <div class="wk-icon"><svg viewBox="0 0 52 28" xmlns="http://www.w3.org/2000/svg"><rect width="52" height="28" fill="#0b6e63"/><path d="M6 18 C10 15,14 15,18 17 C21 13,31 13,34 17 C38 15,42 15,46 18 L46 19 C42 18,38 18,34 20 C31 16,21 16,18 20 C14 18,10 18,6 19 Z" fill="none" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/><path d="M24 9 L28 9" stroke="#fff" stroke-width="1.7" stroke-linecap="round"/></svg></div>
                    <div class="wk-title">DISCURSO PÚBLICO</div>
                  </div>
                  ${d.publicTalk.song ? `<div class="wk-song">Canción ${esc(d.publicTalk.song)}</div>` : ''}
                </div>
                <div class="wk-talk-title">“${esc(d.publicTalk.title || '')}”</div>
                ${d.publicTalk.speaker ? `<div class="wk-speaker">${esc(d.publicTalk.speaker)}</div>` : ''}
                ${d.publicTalk.subtitle ? `<div class="wk-subtitle">${esc(d.publicTalk.subtitle)}</div>` : ''}
              ` : ''}

              ${d.watchtower ? `
                <div class="wk-section-header wk-red" style="margin-top:12px;">
                  <div class="wk-left">
                    <div class="wk-icon"><svg viewBox="0 0 52 28" xmlns="http://www.w3.org/2000/svg"><rect width="52" height="28" fill="#a51f27"/><path d="M12 21 V10 L16 8 V21" fill="none" stroke="#fff" stroke-width="1.7" stroke-linejoin="round"/><path d="M16 8 H23 L23 10" fill="none" stroke="#fff" stroke-width="1.7" stroke-linejoin="round"/><path d="M21 10 H28 V13" fill="none" stroke="#fff" stroke-width="1.7" stroke-linejoin="round"/><path d="M26 13 H33 V17" fill="none" stroke="#fff" stroke-width="1.7" stroke-linejoin="round"/></svg></div>
                    <div class="wk-title">REUNIÓN LA ATALAYA</div>
                  </div>
                  ${d.watchtower.song ? `<div class="wk-song">Canción ${esc(d.watchtower.song)}</div>` : ''}
                </div>
                <div class="wk-watchtower-title">“${esc(d.watchtower.title || '')}”</div>
                ${d.watchtower.conductor ? `<div class="wk-watchtower-conductor">${esc(d.watchtower.conductor)}</div>` : ''}
              ` : ''}

              ${d.closingSong ? `<div class="wk-bottom-song">Canción ${esc(d.closingSong)}</div>` : ''}
              ${d.cleaningLabel ? `<div class="wk-cleaning">${esc(d.cleaningLabel)}</div>` : ''}
            </div>
          </div>
        </div>`;
    }

    function renderPreaching(d) {
      return '<div class="empty-state">Por ahora esta sección está vacía.</div>';
    }

    loadData(false);
  </script>
</body>
</html>
