<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roles semanales</title>
  <style>
    :root {
      --green:#0b6e63;
      --green-soft:#d9ddda;
      --green-line:#2c7b70;
      --blue:#3c7f8f;
      --blue-line:#4f8d98;
      --gold:#a87d10;
      --gold-line:#b18a18;
      --red:#a51f27;
      --red-line:#b13338;
      --bg:#edf1f2;
      --paper:#f5f5f3;
      --border:#d8d8d4;
      --text:#152128;
      --muted:#5e6a70;
      --tab:#e9edeb;
      --night:#183556;
      --daychip:#e0b11a;
      --daybg:#23443f;
      --pdf-bg:#fff;
      --chip:#f0f3f4;
    }

    * { box-sizing:border-box; }
    html, body { margin:0; padding:0; }
    body { font-family:Arial,Helvetica,sans-serif; background:var(--bg); color:var(--text); padding:14px; }
    .app { max-width:980px; margin:0 auto; }

    .meeting-menu { display:flex; gap:8px; flex-wrap:wrap; margin:0 0 12px; }
    .meeting-tab { border:1px solid #cfd6d8; background:var(--tab); color:#23443f; padding:10px 14px; border-radius:999px; font-size:14px; font-weight:700; cursor:pointer; }
    .meeting-tab.active { background:var(--green); color:#fff; border-color:var(--green); box-shadow:0 2px 8px rgba(11,110,99,.18); }
    .view { display:none; }
    .view.active { display:block; }
    .hidden { display:none !important; }
    .loading-state,.empty-state,.error-state { background:#fff; border:1px dashed #cad2d6; border-radius:20px; padding:28px 20px; text-align:center; color:#506067; font-size:16px; }
    .error-state small { display:block; margin-top:8px; color:#8b4a4a; white-space:pre-wrap; }

    /* ENTRESEMANA */
    .card { background:var(--paper); border:1px solid var(--border); border-radius:18px; box-shadow:0 2px 10px rgba(0,0,0,.05); overflow:hidden; }
    .head { background:var(--green); color:#fff; padding:14px 18px 10px; font-size:clamp(1.35rem,2.2vw,1.95rem); line-height:1.15; }
    .sub { background:var(--green-soft); color:var(--green); padding:6px 18px 8px; font-weight:700; }
    .block { padding:0 18px 12px; }
    .section-title { font-size:1.1rem; font-weight:800; text-transform:uppercase; margin:14px 0 8px; padding-bottom:6px; border-bottom:3px solid; }
    .s-blue { color:var(--blue); border-color:var(--blue-line); }
    .s-gold { color:var(--gold); border-color:var(--gold-line); }
    .s-red { color:var(--red); border-color:var(--red-line); }
    .song { float:right; font-size:.98rem; font-weight:700; }
    .item { margin:10px 0; }
    .item-title { font-size:1.08rem; font-weight:700; line-height:1.25; }
    .blue-t { color:var(--blue); } .gold-t { color:var(--gold); } .red-t { color:var(--red); }
    .item-person { margin-top:5px; margin-left:14px; font-size:1.05rem; color:#111; }
    .lector-below { margin-top:2px; margin-left:14px; color:var(--red); font-size:1rem; font-weight:700; }
    .lector-below .lector-name { color:#111; font-weight:400; margin-left:4px; }
    .footer-note,.footer-prayer,.cleaning { padding:0 18px 12px; color:var(--green); font-weight:700; }
    .cleaning { font-size:1.35rem; padding-bottom:18px; }

    /* FIN DE SEMANA - rediseño más fiel */
    .wk-wrap { max-width:760px; margin:0 auto; }
    .wk-card { background:#f7f7f2; border:2px solid #2f8b7f; border-radius:0 0 42px 42px; overflow:hidden; }
    .wk-date { text-align:center; color:var(--green); font-size:clamp(2rem,3vw,2.6rem); font-weight:800; padding:16px 18px 14px; border-bottom:1px solid #2f8b7f; }
    .wk-body { padding:16px 44px 22px; }
    .wk-president { color:var(--green); font-size:clamp(1.1rem,1.5vw,1.5rem); font-weight:800; margin-bottom:16px; }
    .wk-president .name { font-weight:400; color:#275e58; }
    .wk-band { display:flex; align-items:center; justify-content:space-between; gap:12px; border-bottom:3px solid; padding-bottom:6px; margin-top:12px; }
    .wk-band-left { display:flex; align-items:center; gap:16px; min-width:0; }
    .wk-icon-box { width:64px; height:36px; flex:0 0 64px; display:flex; align-items:center; justify-content:center; }
    .wk-icon-box svg { width:64px; height:36px; display:block; }
    .wk-green-band { color:var(--green); border-color:var(--green-line); }
    .wk-red-band { color:#b11f29; border-color:#c43a42; }
    .wk-band-title { font-size:clamp(1.1rem,1.5vw,1.6rem); font-weight:800; text-transform:uppercase; line-height:1.1; }
    .wk-band-song { font-size:clamp(1rem,1.2vw,1.3rem); font-weight:700; white-space:nowrap; }
    .wk-main-title { text-align:center; color:var(--green); font-size:clamp(2.6rem,5vw,4.2rem); font-weight:800; line-height:1.12; margin:28px auto 14px; }
    .wk-main-speaker { text-align:center; color:#165a56; font-size:clamp(1.8rem,2.4vw,2.6rem); margin:12px 0 6px; }
    .wk-main-sub { text-align:center; color:#2d6963; font-size:clamp(1.25rem,1.8vw,1.8rem); margin:0 0 14px; }
    .wk-watch-title { text-align:center; color:#ab1a23; font-size:clamp(2.4rem,4vw,3.5rem); font-weight:800; line-height:1.13; margin:22px auto 12px; }
    .wk-watch-conductor { text-align:center; color:#8c1820; font-size:clamp(1.7rem,2.2vw,2.3rem); margin:8px 0 20px; }
    .wk-foot-song { text-align:right; color:var(--green); font-size:clamp(1.2rem,1.4vw,1.5rem); font-weight:800; margin-top:10px; }
    .wk-cleaning { text-align:right; color:var(--green); font-size:clamp(2rem,2.8vw,3rem); font-weight:900; margin-top:10px; }

    /* PREDICACIÓN */
    .pred-wrap { display:grid; gap:14px; }
    .pred-next { background:linear-gradient(135deg,#fff,#f2f7f6); border:1px solid #d3dfdc; border-radius:20px; padding:18px; box-shadow:0 2px 10px rgba(0,0,0,.05); }
    .pred-next-label { font-size:15px; font-weight:900; letter-spacing:.05em; text-transform:uppercase; color:var(--green); margin-bottom:10px; }
    .pred-next-head { display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:flex-start; }
    .pred-dayline { font-size:clamp(1.25rem,1.9vw,1.7rem); font-weight:800; color:#0f3c37; }
    .pred-hours { margin-top:4px; color:var(--muted); font-size:1rem; }
    .pred-chip { display:inline-block; padding:7px 14px; border-radius:999px; color:#fff; font-size:.9rem; font-weight:800; box-shadow:0 1px 4px rgba(0,0,0,.12); }
    .pred-chip.manana { background:var(--daychip); color:#2b2400; }
    .pred-chip.noche { background:var(--night); }
    .pred-next-body { margin-top:14px; display:grid; gap:10px; }
    .pred-point-big { font-size:1.22rem; font-weight:900; color:var(--green); line-height:1.15; }
    .pred-conductor { font-size:1rem; font-weight:600; color:#22353a; }
    .pred-territory-line { font-size:.96rem; font-weight:700; color:#22353a; }

    .pred-program { background:#fff; border:1px solid #d8e0de; border-radius:20px; overflow:hidden; box-shadow:0 2px 10px rgba(0,0,0,.04); }
    .pred-program-head { padding:16px; border-bottom:1px solid #e2e8e6; }
    .pred-program-title { font-size:1.2rem; font-weight:800; color:#113d37; }
    .pred-week-label { margin-top:4px; font-size:.95rem; color:var(--muted); font-weight:700; }
    .pred-days { display:grid; gap:12px; padding:12px; }
    .pred-day-card { background:#fff; border:1px solid #d7e1de; border-radius:18px; overflow:hidden; }
    .pred-day-head { background:var(--daybg); color:#fff; padding:14px 14px 12px; text-align:center; }
    .pred-day-name { font-size:1.3rem; font-weight:900; letter-spacing:.03em; }
    .pred-day-date { display:none; }
    .pred-day-grid { display:grid; grid-template-columns:1fr 1fr; }
    .pred-shift-col { padding:14px; min-height:120px; }
    .pred-shift-col + .pred-shift-col { border-left:1px solid #e6ecea; }
    .pred-shift-top { display:flex; justify-content:space-between; gap:8px; margin-bottom:8px; }
    .pred-shift-title,.pred-shift-time { font-size:.95rem; font-weight:800; color:#22353a; }
    .pred-shift-title { text-transform:uppercase; letter-spacing:.05em; }
    .pred-shift-point { font-size:1.06rem; font-weight:900; color:var(--green); line-height:1.18; }
    .pred-shift-conductor { margin-top:6px; font-size:.95rem; color:#22353a; font-weight:600; }
    .pred-shift-territory { margin-top:8px; font-size:.93rem; color:#22353a; font-weight:700; }
    .pred-shift-note { display:inline-block; margin-top:8px; background:var(--chip); color:#33444a; border-radius:999px; padding:6px 10px; font-size:.88rem; font-weight:700; }
    .pred-empty { color:var(--muted); font-size:.95rem; font-style:italic; padding-top:8px; }

    /* PDF */
    .pdf-wrap { width:100%; height:calc(100vh - 110px); min-height:78vh; background:var(--pdf-bg); border:1px solid var(--border); border-radius:18px; overflow:hidden; box-shadow:0 2px 10px rgba(0,0,0,.06); }
    .pdf-frame { width:100%; height:100%; border:none; background:var(--pdf-bg); }

    @media (max-width:760px) {
      .pred-day-grid { grid-template-columns:1fr; }
      .pred-shift-col + .pred-shift-col { border-left:none; border-top:1px solid #e6ecea; }
      .wk-body { padding:14px 18px 20px; }
      .wk-main-title { font-size:clamp(2.2rem,7vw,3.1rem); }
      .wk-watch-title { font-size:clamp(2rem,6vw,2.9rem); }
    }
    @media (max-width:640px) {
      body { padding:0; }
      .meeting-menu { position:sticky; top:0; z-index:20; background:rgba(237,241,242,.97); padding:10px 12px 8px; margin-bottom:0; backdrop-filter:blur(6px); }
      .meeting-tab { flex:1 1 calc(50% - 8px); min-width:148px; text-align:center; }
      .card,.pred-program,.pdf-wrap,.pred-next,.wk-card { border-left:none; border-right:none; box-shadow:none; border-radius:0; }
      .pred-program-head,.pred-days { padding-left:16px; padding-right:16px; }
      .pdf-wrap { height:calc(100vh - 86px); min-height:calc(100vh - 86px); }
      .wk-date { font-size:2rem; }
    }
    @media (max-width:420px) {
      .meeting-tab { flex:1 1 100%; }
      .pred-day-name { font-size:1.15rem; }
      .pred-dayline { font-size:1.18rem; }
      .item-person,.lector-below { margin-left:10px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="meeting-menu" role="tablist" aria-label="Tipo de reunión">
      <button class="meeting-tab active" data-view="entresemana" type="button">REUNIÓN ENTRESEMANA</button>
      <button class="meeting-tab" data-view="findesemana" type="button">REUNIÓN FIN DE SEMANA</button>
      <button class="meeting-tab" data-view="predicacion" type="button">PREDICACIÓN</button>
      <button class="meeting-tab" data-view="territorio" type="button">MAPA TERRITORIO</button>
    </div>
    <div class="loading-state" id="loading">Cargando roles…</div>
    <div class="view active hidden" id="view-entresemana"></div>
    <div class="view hidden" id="view-findesemana"></div>
    <div class="view hidden" id="view-predicacion"></div>
    <div class="view hidden" id="view-territorio"></div>
  </div>
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxCzMZ59Y4rEC8mR0_eqA3_yxDT1OXRC33CqsIUFgBqu92oDBkV-5V7rzD614NSa7cIhw/exec';
    const TERRITORY_PDF = './TERRITORIO%20FLORES%20VIOLETAS%202025.pdf#toolbar=1&navpanes=0&view=FitH';
    const tabs = Array.from(document.querySelectorAll('.meeting-tab'));
    const views = {entresemana:document.getElementById('view-entresemana'),findesemana:document.getElementById('view-findesemana'),predicacion:document.getElementById('view-predicacion'),territorio:document.getElementById('view-territorio')};

    function activate(viewName) {
      const valid = views[viewName] ? viewName : 'entresemana';
      tabs.forEach(tab => tab.classList.toggle('active', tab.dataset.view === valid));
      Object.keys(views).forEach(key => views[key].classList.toggle('active', key === valid));
      if (location.hash !== '#' + valid) history.replaceState(null, '', '#' + valid);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    tabs.forEach(tab => tab.addEventListener('click', () => activate(tab.dataset.view)));

    function esc(v) {
      return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }
    function showLoading(isLoading) {
      document.getElementById('loading').classList.toggle('hidden', !isLoading);
      Object.values(views).forEach(el => el.classList.toggle('hidden', isLoading));
    }
    function showApiError(message, detail='') {
      showLoading(false);
      views.entresemana.innerHTML = `<div class="error-state"><strong>${esc(message)}</strong>${detail ? `<small>${esc(detail)}</small>` : ''}</div>`;
      views.findesemana.innerHTML = '';
      views.predicacion.innerHTML = renderPreaching({hasData:false,items:[]});
      views.territorio.innerHTML = renderTerritorio();
      activate('entresemana');
    }
    function loadData() {
      if (!API_URL) { showApiError('Falta configurar la URL del API.'); return; }
      showLoading(true);
      const callbackName='__rolesPrefix_'+Date.now();
      const separator = API_URL.includes('?') ? '&' : '?';
      const src = `${API_URL}${separator}prefix=${callbackName}&_ts=${Date.now()}`;
      const script = document.createElement('script');
      script.src = src; script.async = true;
      const timeout = setTimeout(() => { cleanup(); showApiError('No se pudo cargar el API.','Se agotó el tiempo de espera. Revisa que Apps Script siga devolviendo JSONP.'); }, 15000);
      function cleanup() { clearTimeout(timeout); delete window[callbackName]; if (script.parentNode) script.parentNode.removeChild(script); }
      window[callbackName] = function(data) {
        cleanup();
        if (!data || data.ok !== true) { showApiError('El API respondió con datos inválidos.', JSON.stringify(data || {})); return; }
        renderAll(data); showLoading(false);
        const requested = (location.hash || '').replace('#','').trim().toLowerCase();
        activate(requested || 'entresemana');
      };
      script.onerror = function() { cleanup(); showApiError('Error al cargar el API.','La URL respondió con error o Apps Script devolvió una página distinta a JavaScript.'); };
      document.body.appendChild(script);
    }

    function renderAll(data) {
      views.entresemana.innerHTML = renderMidweek(data.entresemana || {hasData:false});
      views.findesemana.innerHTML = renderWeekend(data.findesemana || {hasData:false});
      views.predicacion.innerHTML = renderPreaching(data.predicacion || {hasData:false,items:[]});
      views.territorio.innerHTML = renderTerritorio();
    }

    function renderMidweek(d) {
      if (!d || !d.hasData) return '<div class="empty-state">No hay datos cargados para <strong>Reunión Entresemana</strong> en la semana actual.</div>';
      const renderList = (items, cls, lector='') => (items || []).map(it => `
<div class="item"><div class="item-title ${cls}">${it.number ? esc(it.number)+'. ' : ''}${esc(it.title || '')}</div>${it.names ? `<div class="item-person">${esc(it.names)}</div>` : ''}${it.isCongBibleStudy && lector ? `<div class="lector-below">Lector:<span class="lector-name"> ${esc(lector)}</span></div>` : ''}</div>`).join('');
      return `
<div class="card"><div class="head">${esc(d.weekTitle || '')}</div>${d.president ? `<div class="sub">Presidente: ${esc(d.president)}</div>` : ''}<div class="block"><div class="section-title s-blue">TESOROS DE LA BIBLIA ${d.openingSong ? `<span class="song">Canción ${esc(d.openingSong)}</span>` : ''}</div>${renderList(d.treasures, 'blue-t')}<div class="section-title s-gold">SEAMOS MEJORES MAESTROS</div>${renderList(d.teachers, 'gold-t')}<div class="section-title s-red">NUESTRA VIDA CRISTIANA ${d.middleSong ? `<span class="song">Canción ${esc(d.middleSong)}</span>` : ''}</div>${renderList(d.life, 'red-t', d.lector || '')}</div>${d.closingSong ? `<div class="footer-note">Palabras de conclusión y canción ${esc(d.closingSong)}</div>` : ''}${d.prayerName ? `<div class="footer-prayer">Oración conclusión&nbsp;&nbsp;${esc(d.prayerName)}</div>` : ''}${d.cleaningLabel ? `<div class="cleaning">${esc(d.cleaningLabel)}</div>` : ''}</div>`;
    }

    function renderWeekend(d) {
      if (!d || !d.hasData) return '<div class="empty-state">No hay datos cargados para <strong>Reunión Fin de Semana</strong> en la semana actual.</div>';
      return `
<div class="wk-wrap"><div class="wk-card"><div class="wk-date">${esc(d.headerTitle || '')}</div><div class="wk-body">${d.president ? `<div class="wk-president">PRESIDENTE: <span class="name">${esc(d.president)}</span></div>` : ''}${d.publicTalk ? `<div class="wk-band wk-green-band"><div class="wk-band-left"><div class="wk-icon-box"><svg viewBox="0 0 64 36" xmlns="http://www.w3.org/2000/svg"><rect width="64" height="36" fill="#0b6e63"/><path d="M7 23 C12 20,17 20,22 22 C26 18,38 18,42 22 C47 20,52 20,57 23 L57 24 C52 23,47 23,42 25 C38 21,26 21,22 25 C17 23,12 23,7 24 Z" fill="none" stroke="#fff" stroke-width="2" stroke-linejoin="round"/><path d="M29 12 L35 12" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg></div><div class="wk-band-title">DISCURSO PÚBLICO</div></div>${d.publicTalk.song ? `<div class="wk-band-song">Canción ${esc(d.publicTalk.song)}</div>` : ''}</div><div class="wk-main-title">“${esc(d.publicTalk.title || '')}”</div>${d.publicTalk.speaker ? `<div class="wk-main-speaker">${esc(d.publicTalk.speaker)}</div>` : ''}${d.publicTalk.subtitle ? `<div class="wk-main-sub">${esc(d.publicTalk.subtitle)}</div>` : ''}` : ''}${d.watchtower ? `<div class="wk-band wk-red-band"><div class="wk-band-left"><div class="wk-icon-box"><svg viewBox="0 0 64 36" xmlns="http://www.w3.org/2000/svg"><rect width="64" height="36" fill="#b11f29"/><path d="M14 27 V13 L20 10 V27" fill="none" stroke="#fff" stroke-width="2" stroke-linejoin="round"/><path d="M20 10 H30 L30 13" fill="none" stroke="#fff" stroke-width="2"/><path d="M28 13 H38 V17" fill="none" stroke="#fff" stroke-width="2"/><path d="M36 17 H46 V22" fill="none" stroke="#fff" stroke-width="2"/></svg></div><div class="wk-band-title">REUNIÓN LA ATALAYA</div></div>${d.watchtower.song ? `<div class="wk-band-song">Canción ${esc(d.watchtower.song)}</div>` : ''}</div><div class="wk-watch-title">“${esc(d.watchtower.title || '')}”</div>${d.watchtower.conductor ? `<div class="wk-watch-conductor">${esc(d.watchtower.conductor)}</div>` : ''}` : ''}${d.closingSong ? `<div class="wk-foot-song">Canción ${esc(d.closingSong)}</div>` : ''}${d.cleaningLabel ? `<div class="wk-cleaning">${esc(d.cleaningLabel)}</div>` : ''}</div></div></div>`;
    }

    const DAY_ORDER = ['lunes','martes','miercoles','jueves','viernes','sabado','domingo'];
    const DAY_LABEL = {lunes:'Lunes', martes:'Martes', miercoles:'Miércoles', jueves:'Jueves', viernes:'Viernes', sabado:'Sábado', domingo:'Domingo'};
    function normText(v) { return String(v ?? '').normalize('NFD').replace(/[̀-ͯ]/g,'').trim().toLowerCase(); }
    function toMinutes(hhmm) { if (!hhmm) return null; const p = String(hhmm).split(':'); if (p.length < 2) return null; const h = Number(p[0]), m = Number(p[1]); if (Number.isNaN(h) || Number.isNaN(m)) return null; return h*60 + m; }
    function formatTimeRange(item) { if (item.horaTexto) return item.horaTexto; if (item.horaInicioTexto && item.horaFinTexto) return `${item.horaInicioTexto} - ${item.horaFinTexto}`; return ''; }
    function preprocessPredication(raw) {
      const items = Array.isArray(raw.items) ? raw.items : [];
      return items.map((it, idx) => {
        const dayName = it.dia || '';
        const start = toMinutes(it.horaInicio || '');
        const shiftNorm = normText(it.turno || (start !== null && start < 720 ? 'Mañana' : 'Noche'));
        return { id: it.id || `p${idx}`, dia: dayName, diaNorm: normText(dayName), fechaISO: it.fechaISO || it.fecha || '', turno: it.turno || (shiftNorm.includes('noche') ? 'Noche' : 'Mañana'), turnoNorm: shiftNorm.includes('noche') ? 'noche' : 'mañana', horaInicio: it.horaInicio || '', horaFin: it.horaFin || '', horaInicioTexto: it.horaInicioTexto || '', horaFinTexto: it.horaFinTexto || '', horaTexto: it.horaTexto || '', puntoReunion: it.puntoReunion || it.punto || '', conductor: it.conductor || '', territorio: it.territorio || '', notas: it.notas || '' };
      }).sort((a,b) => (a.fechaISO || '').localeCompare(b.fechaISO || '') || (a.horaInicio || '').localeCompare(b.horaInicio || ''));
    }
    function isMeetingBlock(it) { return normText(it.puntoReunion || '').includes('vida y ministerio'); }
  function getPredChip(turnoNorm) { return `<span class="pred-chip ${turnoNorm === 'noche' ? 'noche' : 'manana'}">${turnoNorm === 'noche' ? 'Noche' : 'Mañana'}</span>`; }
    function getHeadline(items) {
      if (!items.length) return null;
      const now = new Date();
      const todayISO = now.toISOString().slice(0,10);
      const mins = now.getHours()*60 + now.getMinutes();
      const active = items.find(it => it.fechaISO === todayISO && it.horaInicio && it.horaFin && mins >= toMinutes(it.horaInicio) && mins < toMinutes(it.horaFin));
      if (active) return { mode:'activo', item:active };
      const upcomingToday = items.find(it => it.fechaISO === todayISO && it.horaInicio && mins < toMinutes(it.horaInicio));
      if (upcomingToday) return { mode:'proximo', item:upcomingToday };
      const future = items.find(it => (it.fechaISO || '') > todayISO || ((it.fechaISO || '') === todayISO && it.horaInicio && mins < toMinutes(it.horaInicio)));
      return { mode:'proximo', item: future || items[0] };
    }
    function renderPredShift(it) {
  if (!it) return '<div class="pred-empty">Sin turno</div>';

  const meeting = isMeetingBlock(it);

  return `
    <div class="pred-shift-top">
      ${getPredChip(it.turnoNorm)}
      <div class="pred-shift-time">${esc(formatTimeRange(it))}</div>
    </div>
    <div class="pred-shift-point">${esc(it.puntoReunion || '')}</div>
    ${!meeting && it.conductor ? `<div class="pred-shift-conductor">${esc(it.conductor)}</div>` : ''}
    ${!meeting && it.territorio ? `<div class="pred-shift-territory">Territorio: ${esc(it.territorio)}</div>` : ''}
    ${!meeting && it.notas ? `<span class="pred-shift-note">${esc(it.notas)}</span>` : ''}
  `;
}
    function renderPreaching(d) {
      const items = preprocessPredication(d || {hasData:false,items:[]});
      const weekLabel = d && d.semanaTexto ? d.semanaTexto : '';
      const headline = getHeadline(items);
      const top = headline ? (() => {
        const it = headline.item; const meeting = isMeetingBlock(it);
        return `<div class="pred-next"><div class="pred-next-label">${headline.mode === 'activo' ? 'Turno actual' : 'Próxima predicación'}</div><div class="pred-next-head"><div><div class="pred-dayline">${esc(it.dia || '')}</div><div class="pred-hours">${esc(formatTimeRange(it))}</div></div>${getPredChip(it.turnoNorm)}</div><div class="pred-next-body"><div class="pred-point-big">${esc(it.puntoReunion || 'Sin definir')}</div>${!meeting && it.conductor ? `<div class="pred-conductor">${esc(it.conductor)}</div>` : ''}${!meeting && it.territorio ? `<div class="pred-territory-line">Territorio: ${esc(it.territorio)}</div>` : ''}${!meeting && it.notas ? `<span class="pred-shift-note">${esc(it.notas)}</span>` : ''}</div></div>`;
      })() : `<div class="pred-next"><div class="pred-next-label">Próxima predicación</div><div class="empty-state">No hay turnos cargados todavía.</div></div>`;

      const grouped = Object.fromEntries(DAY_ORDER.map(day => [day, {manana:null, noche:null}]));
      items.forEach(it => { if (!grouped[it.diaNorm]) return; if (it.turnoNorm === 'mañana') grouped[it.diaNorm].manana = it; if (it.turnoNorm === 'noche') grouped[it.diaNorm].noche = it; });
      const daysHtml = DAY_ORDER.map(day => { const g = grouped[day]; return `<div class="pred-day-card"><div class="pred-day-head"><div class="pred-day-name">${DAY_LABEL[day]}</div></div><div class="pred-day-grid"><div class="pred-shift-col">${renderPredShift(g.manana)}</div><div class="pred-shift-col">${renderPredShift(g.noche)}</div></div></div>`; }).join('');
      return `<div class="pred-wrap">${top}<div class="pred-program"><div class="pred-program-head"><div><div class="pred-program-title">Programa completo de predicación</div>${weekLabel ? `<div class="pred-week-label">${esc(weekLabel)}</div>` : ''}</div></div><div class="pred-days">${daysHtml || '<div class="empty-state">No hay turnos de predicación cargados todavía.</div>'}</div></div></div>`;
    }
    function renderTerritorio() { return `<div class="pdf-wrap"><iframe class="pdf-frame" src="${TERRITORY_PDF}" title="Mapa territorio"></iframe></div>`; }

    loadData();
  </script>
</body>
</html>
